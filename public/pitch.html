<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoreHealth — Live Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #590212 0%, #A63F52 60%, #D96C80 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 32px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.3);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      overflow: hidden;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 800;
      color: #590212;
      letter-spacing: -0.5px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #590212, #D96C80);
      border-radius: 2px;
    }

    .headline {
      font-size: 18px;
      font-weight: 700;
      color: #1C1010;
      line-height: 1.35;
    }

    .sub {
      font-size: 14px;
      color: #7A6060;
      margin-top: -16px;
      line-height: 1.5;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 16px;
      padding: 16px;
      background: #FAF6F1;
      border: 2px solid rgba(90,2,18,0.1);
    }

    .url-box {
      background: #FAF6F1;
      border: 1.5px solid rgba(90,2,18,0.15);
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      color: #590212;
      letter-spacing: 0.2px;
      width: 100%;
    }

    .instructions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #FAF6F1;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: left;
    }

    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #590212, #A63F52);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 13px;
      color: #1C1010;
      font-weight: 500;
    }

    .tagline {
      font-size: 13px;
      color: #7A6060;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo"><img src="/logo.png" alt="CoreHealth" /></div>
      <div class="brand-name">CoreHealth</div>
    </div>

    <div class="divider"></div>

    <div class="headline">Experimenta a app ao vivo!</div>
    <div class="sub">Aponta a câmara do telemóvel para o QR code</div>

    <div id="qrcode"></div>

    <div class="url-box">corehealth-app.vercel.app</div>

    <div class="instructions">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Abre a câmara do telemóvel</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Aponta para o QR code — abre automaticamente</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Escolhe a tua persona: Dona Rosa ou Ricardo</div>
      </div>
    </div>

    <div class="tagline">"A Saúde Não Deve Ser um Privilégio."</div>
  </div>

  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://corehealth-app.vercel.app',
      width: 220,
      height: 220,
      colorDark: '#590212',
      colorLight: '#FAF6F1',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
